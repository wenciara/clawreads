<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>ClawReads - 全球小语种新闻监控</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root {
      --theme-color: #667eea;
      --base-font-size: 16px;
    }
    .app-name {
      font-size: 1.5rem;
      font-weight: bold;
    }
    .sidebar-nav a {
      font-size: 14px;
    }
    .markdown-section h1 {
      color: #667eea;
      border-bottom: 2px solid #667eea;
      padding-bottom: 10px;
    }
    .markdown-section h2 {
      color: #764ba2;
      margin-top: 30px;
    }
    .markdown-section blockquote {
      border-left: 4px solid #667eea;
      background: #f8f9fa;
      padding: 10px 15px;
    }
    .markdown-section table {
      border-collapse: collapse;
      width: 100%;
      margin: 20px 0;
    }
    .markdown-section th {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 12px;
      text-align: left;
    }
    .markdown-section td {
      padding: 10px 12px;
      border-bottom: 1px solid #e0e0e0;
    }
    .markdown-section tr:hover {
      background: #f5f5f5;
    }
    .sidebar {
      background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
    }
    .sidebar-nav a {
      color: white !important;
    }
    .sidebar-nav a:hover {
      color: #ffd700 !important;
    }
    .app-name-link {
      color: white !important;
    }
    .sidebar-nav ul ul {
      margin-left: 15px;
    }
    .sidebar-nav li.collapse .app-sub-sidebar {
      display: none;
    }
    .sidebar-toggle {
      background: #667eea;
    }
    .sidebar-toggle span {
      background: white;
    }
    /* 日历样式 */
    .calendar {
      width: 100%;
      border-collapse: collapse;
      margin: 20px 0;
    }
    .calendar th {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 12px;
      text-align: center;
      font-weight: bold;
    }
    .calendar td {
      width: 14.28%;
      height: 60px;
      text-align: center;
      vertical-align: middle;
      border: 1px solid #e0e0e0;
      position: relative;
    }
    .calendar td.empty {
      background: #f9f9f9;
    }
    .calendar td.has-content {
      background: #e8f4f8;
      font-weight: bold;
    }
    .calendar td.has-content a {
      color: #667eea;
      text-decoration: none;
      display: block;
      width: 100%;
      height: 100%;
      line-height: 60px;
    }
    .calendar td.has-content a:hover {
      background: #d0e8f0;
      border-radius: 4px;
    }
    .calendar td.today {
      border: 2px solid #667eea;
    }
    .date-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 15px 0;
    }
    .date-tag {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 6px 12px;
      border-radius: 20px;
      text-decoration: none;
      font-size: 14px;
      transition: transform 0.2s;
    }
    .date-tag:hover {
      transform: scale(1.05);
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.4);
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    // 可用的日期列表（自动生成的）
    const availableDates = ["2026-03-15", "2026-03-14", "2026-03-13", "2026-03-12", "2026-03-11", "2026-03-08", "2026-03-06", "2026-03-05", "2026-03-04"];
    
    window.$docsify = {
      name: '🌍 ClawReads',
      repo: 'https://github.com/wenciara/clawreads',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      relativePath: true,
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '🔍 搜索新闻...',
        noData: '没有找到相关内容',
        depth: 6
      },
      copyCode: {
        buttonText: '复制',
        errorText: '复制失败',
        successText: '已复制'
      },
      plugins: [
        function(hook, vm) {
          hook.afterEach(function(html) {
            // 在首页插入动态日历
            if (vm.route.path === '/') {
              const calendarHtml = generateCalendar();
              return html.replace('<!-- DYNAMIC_CALENDAR -->', calendarHtml);
            }
            return html;
          });
        }
      ]
    };
    
    function generateCalendar() {
      const today = new Date();
      const year = 2026;
      const month = 03 - 1; // 0-indexed
      
      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      
      let calendarHtml = '<h2>📆 2026年03月</h2>';
      calendarHtml += '<table class="calendar"><tr>';
      calendarHtml += '<th>周日</th><th>周一</th><th>周二</th><th>周三</th><th>周四</th><th>周五</th><th>周六</th>';
      calendarHtml += '</tr><tr>';
      
      // 填充空白天数
      for (let i = 0; i < firstDay; i++) {
        calendarHtml += '<td class="empty"></td>';
      }
      
      // 填充日期 - 使用相对路径 ./YYYY-MM-DD/ 避免GitHub Pages子目录404
      for (let day = 1; day <= daysInMonth; day++) {
        const dayStr = day.toString().padStart(2, '0');
        const dateStr = year + '-03-' + dayStr;
        const hasContent = availableDates.includes(dateStr);
        const isToday = today.getDate() === day && today.getMonth() === month && today.getFullYear() === year;
        
        let cellClass = '';
        if (hasContent) cellClass += 'has-content ';
        if (isToday) cellClass += 'today ';
        
        if (hasContent) {
          // 关键修复：使用相对路径 ./ 而不是绝对路径 /
          calendarHtml += '<td class="' + cellClass + '"><a href="./' + dateStr + '/">' + day + '</a></td>';
        } else {
          calendarHtml += '<td class="' + cellClass + '">' + day + '</td>';
        }
        
        if ((firstDay + day) % 7 === 0) {
          calendarHtml += '</tr><tr>';
        }
      }
      
      calendarHtml += '</tr></table>';
      
      // 添加日期标签云 - 同样使用相对路径
      calendarHtml += '<h3>📌 快速导航</h3>';
      calendarHtml += '<div class="date-list">';
      availableDates.slice().reverse().forEach(date => {
        const day = date.split('-')[2];
        calendarHtml += '<a class="date-tag" href="./' + date + '/">03月' + parseInt(day) + '日</a>';
      });
      calendarHtml += '</div>';
      
      return calendarHtml;
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-markdown.min.js"></script>
</body>
</html>
