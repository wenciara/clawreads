<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>ClawReads - 全球小语种新闻监控</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root {
      --theme-color: #667eea;
      --base-font-size: 16px;
    }
    .app-name {
      font-size: 1.5rem;
      font-weight: bold;
    }
    .sidebar-nav a {
      font-size: 14px;
    }
    .markdown-section h1 {
      color: #667eea;
      border-bottom: 2px solid #667eea;
      padding-bottom: 10px;
    }
    .markdown-section h2 {
      color: #764ba2;
      margin-top: 30px;
    }
    .markdown-section blockquote {
      border-left: 4px solid #667eea;
      background: #f8f9fa;
      padding: 10px 15px;
    }
    .markdown-section table {
      border-collapse: collapse;
      width: 100%;
      margin: 20px 0;
    }
    .markdown-section th {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 12px;
      text-align: left;
    }
    .markdown-section td {
      padding: 10px 12px;
      border-bottom: 1px solid #e0e0e0;
    }
    .markdown-section tr:hover {
      background: #f5f5f5;
    }
    .sidebar {
      background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
    }
    .sidebar-nav a {
      color: white !important;
    }
    .sidebar-nav a:hover {
      color: #ffd700 !important;
    }
    .app-name-link {
      color: white !important;
    }
    .sidebar-nav ul ul {
      margin-left: 15px;
    }
    .sidebar-nav li.collapse .app-sub-sidebar {
      display: none;
    }
    .sidebar-toggle {
      background: #667eea;
    }
    .sidebar-toggle span {
      background: white;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '🌍 ClawReads',
      repo: 'https://github.com/wenciara/clawreads',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      relativePath: false,
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '🔍 搜索新闻...',
        noData: '没有找到相关内容',
        depth: 6
      },
      copyCode: {
        buttonText: '复制',
        errorText: '复制失败',
        successText: '已复制'
      },
      pagination: {
        previousText: '上一篇',
        nextText: '下一篇',
        crossChapter: true
      },
      plugins: [
        function(hook, vm) {
          hook.beforeEach(function(html) {
            var url = 'https://github.com/wenciara/clawreads/blob/main/' + vm.route.file;
            var editHtml = '[:memo: 在 GitHub 上编辑](' + url + ')\n';
            return html + '\n\n---\n' + editHtml;
          });
        }
      ]
    };
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-markdown.min.js"></script>
</body>
</html>
